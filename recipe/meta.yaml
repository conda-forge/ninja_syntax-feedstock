{% set name = "ninja_syntax" %}
{% set version = "1.7.2" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/ninja_syntax-{{ version }}.tar.gz
  sha256: 342dc97b9e88a6495bae22953ee6063f91d2f03db6f727b62ba5c3092a18ef1f

build:
  number: 1003
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
  run:
    - python >={{ python_min }}

test:
  imports:
    - ninja_syntax
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.python.org/pypi/ninja_syntax/1.6.0
  license: Apache-2.0
  license_file: COPYING
  summary: Python module for generating .ninja files

extra:
  recipe-maintainers:
    - dfroger
